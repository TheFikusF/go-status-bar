# status-bar configuration
# Copy to ~/.config/status-bar/config.yaml
# Override path with STATUSBAR_CONFIG env var.

# ── Modules ──────────────────────────────────────────────────────────────────
# Set any module to false to hide it entirely.
modules:
  workspaces: false
  focused_app: true
  music: true
  mode: true
  scratchpad: true
  date_clock: true
  time_clock: true
  notification: true
  mpd: true
  wallpaper: true
  clipboard: true
  weather: true
  pipewire: true
  network: true
  bluetooth: true
  power_profile: false
  cpu: true
  memory: true
  temperature: true
  keyboard_state: false
  language: true
  battery: true
  tray: true
  power: true

# ── World clocks (shown in time popup) ───────────────────────────────────────
world_clocks:
  - name: Prague
    zone: Europe/Prague
  - name: New York
    zone: America/New_York
  - name: Tel Aviv
    zone: Asia/Tel_Aviv
  - name: Kyiv
    zone: Europe/Kyiv
  - name: San Francisco
    zone: America/Los_Angeles
  - name: Maui
    zone: Pacific/Honolulu


# ── Wallpaper ─────────────────────────────────────────────────────────────────
wallpaper:
  dir: ~/Pictures/wp
  auto_switch: true
  interval: 10  # minutes
  on_click: some-wallpaper-app



# ── Weather ───────────────────────────────────────────────────────────────────
# Coordinates for open-meteo.com (decimal degrees).
weather:
  lat: "49.1951"
  lon: "16.6068"
  location: Brno
  on_click: gnome-weather


# ── Audio ─────────────────────────────────────────────────────────────────────
audio:
  on_click: pavucontrol
  show_text: false

# ── Network ───────────────────────────────────────────────────────────────────
network:
  on_click: nm-connection-editor
  show_text: false

# ── Bluetooth ─────────────────────────────────────────────────────────────────
bluetooth:
  show_text: false

# ── Clocks ────────────────────────────────────────────────────────────────────
clocks:
  on_click: gnome-clocks

# ── Calendar ──────────────────────────────────────────────────────────────────
calendar:
  on_click: gnome-calendar

# ── Languages ─────────────────────────────────────────────────────────────────
# Matched in order against the active Hyprland keymap name (case-insensitive).
# Leave this section out to use the built-in emoji labels.
languages:
  - match: english
    label: "🇺🇸🦅🗽"
  - match: ukrain
    label: "🇺🇦 УКР"
  - match: russian
    label: "🛡️ РДК"
